<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CME Bias Tool</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #020617; --surface: #0f172a; --surface2: #1e293b;
    --border: #1e293b; --border2: #334155;
    --text: #f1f5f9; --muted: #64748b; --dim: #475569;
    --live: #22c55e; --blue: #3b82f6;
    --red: #ef4444; --red2: #f87171; --red3: #fca5a5;
    --green: #10b981; --green2: #34d399; --green3: #6ee7b7;
  }
  body { background:var(--bg); color:var(--text); font-family:'JetBrains Mono',monospace; min-height:100vh; padding:24px 16px 60px; }
  .wrap { max-width:680px; margin:0 auto; }
  .header { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:18px; }
  .title { font-size:18px; font-weight:800; letter-spacing:3px; }
  .header-left { display:flex; flex-direction:column; gap:5px; }
  .badge { display:inline-flex; align-items:center; gap:7px; padding:4px 12px; border-radius:20px; border:1px solid var(--border2); background:var(--surface); transition:all 0.3s; }
  .badge.live { background:#052e16; border-color:#16a34a; }
  .badge-dot { width:7px; height:7px; border-radius:50%; background:var(--dim); transition:all 0.3s; }
  .badge.live .badge-dot { background:var(--live); box-shadow:0 0 8px var(--live); animation:pulse 2s infinite; }
  .badge-text { font-size:10px; font-weight:700; color:var(--dim); }
  .badge.live .badge-text { color:var(--live); }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
  .sessions-row { display:flex; gap:6px; flex-wrap:wrap; }
  .session-pill { display:inline-flex; align-items:center; gap:5px; padding:3px 10px; border-radius:20px; font-size:10px; font-weight:700; }
  .session-on  { background:#052e16; border:1px solid #16a34a; color:#22c55e; }
  .session-off { background:#0f172a; border:1px solid #1e293b; color:var(--dim); }
  .btn { font-family:inherit; font-size:12px; font-weight:700; border:none; border-radius:8px; cursor:pointer; }
  .btn-ghost { background:var(--surface2); border:1px solid var(--border2); color:var(--muted); padding:9px 16px; }
  .btn-ghost:disabled { opacity:0.5; cursor:default; }
  .btn-primary { background:var(--blue); color:#fff; padding:9px 18px; }
  .panel { background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:16px; margin-bottom:14px; }
  .panel-label { font-size:11px; color:var(--muted); margin-bottom:8px; }
  .tabs { display:flex; gap:4px; background:var(--surface); border-radius:10px; padding:4px; margin-bottom:14px; }
  .tab { flex:1; padding:9px; border-radius:8px; border:none; background:transparent; color:var(--dim); font-family:inherit; font-size:12px; font-weight:400; cursor:pointer; transition:all 0.15s; }
  .tab.active { background:var(--surface2); color:var(--text); font-weight:700; }
  .card { background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:14px 16px; cursor:pointer; margin-bottom:8px; transition:border-color 0.2s; }
  .card-row { display:flex; justify-content:space-between; align-items:center; }
  .cur-icon { width:36px; height:36px; border-radius:8px; display:flex; align-items:center; justify-content:center; font-weight:800; font-size:12px; }
  .bias-text { font-size:13px; font-weight:700; }
  .conf-row { display:flex; gap:6px; justify-content:flex-end; align-items:center; margin-top:2px; }
  .score-bar { position:relative; height:6px; background:var(--surface2); border-radius:4px; overflow:hidden; margin-top:7px; }
  .score-bar-mid { position:absolute; left:50%; top:0; width:1px; height:100%; background:var(--border2); z-index:1; }
  .score-bar-fill { position:absolute; height:100%; border-radius:4px; transition:all 0.4s ease; }
  .tf-grid { display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px; margin-top:12px; }
  .tf-card { background:var(--surface2); border-radius:8px; padding:10px 12px; }
  .tf-label { font-size:10px; color:var(--muted); font-weight:700; margin-bottom:4px; }
  .tf-row { font-size:11px; color:#94a3b8; }
  .tf-val { color:var(--text); }
  .tf-dist { font-size:12px; font-weight:700; margin-top:4px; }
  .pair-input { background:var(--surface2); border:1px solid var(--border2); border-radius:8px; padding:11px 16px; color:var(--text); font-family:'JetBrains Mono',monospace; font-size:17px; letter-spacing:3px; outline:none; flex:1; }
  .pair-input:focus { border-color:var(--blue); }
  .pair-result { border-radius:10px; padding:18px; text-align:center; margin-top:14px; }
  .cur-compare { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-top:10px; }
  .cur-box { background:var(--surface2); border-radius:8px; padding:14px; text-align:center; }
  .top3-card { background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:14px 16px; display:flex; align-items:center; gap:12px; margin-bottom:8px; }
  .top3-rank { font-size:22px; }
  .top3-pair { font-size:18px; font-weight:800; font-family:monospace; letter-spacing:2px; }
  .top3-diff { font-size:10px; color:var(--dim); margin-top:2px; }
  .footer-note { font-size:10px; color:#1e293b; text-align:center; margin-top:6px; }
  .loading-card { background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:14px 16px; margin-bottom:8px; opacity:0.4; font-size:12px; color:var(--dim); }
  .maj-info { font-size:10px; color:var(--muted); margin-top:2px; }
  .usd-note { font-size:9px; color:var(--dim); margin-top:2px; }
</style>
</head>
<body>
<div class="wrap">

  <div class="header">
    <div class="header-left">
      <div class="title">CME BIAS TOOL</div>
      <div class="badge" id="badge">
        <div class="badge-dot"></div>
        <span class="badge-text" id="badge-text">○ Chargement…</span>
      </div>
      <div class="maj-info" id="maj-info"></div>
      <div class="sessions-row" id="sessions-row"></div>
    </div>
    <button class="btn btn-ghost" id="btn-refresh" onclick="handleRefresh()">↺ Refresh</button>
  </div>

  <div class="tabs">
    <button class="tab active" id="tab-dashboard" onclick="switchTab('dashboard')">Dashboard</button>
    <button class="tab" id="tab-top3" onclick="switchTab('top3')">Top 3 Paires</button>
    <button class="tab" id="tab-pair" onclick="switchTab('pair')">Analyser</button>
  </div>

  <div id="view-dashboard">
    <div id="cards-container"></div>
    <div class="footer-note">Clique sur une carte · M30 · H1 · H2</div>
  </div>

  <div id="view-top3" style="display:none">
    <div class="panel">
      <div class="panel-label">Top 3 opportunités · plus grand écart de force · paires FTMO uniquement</div>
      <div id="top3-container"></div>
    </div>
  </div>

  <div id="view-pair" style="display:none">
    <div class="panel">
      <div class="panel-label">Devises : EUR · GBP · AUD · NZD · JPY · CAD · CHF · USD · XAU · BTC</div>
      <div style="display:flex;gap:8px">
        <input class="pair-input" id="pair-input" placeholder="GBPJPY" maxlength="6"
          oninput="this.value=this.value.toUpperCase()"
          onkeydown="if(event.key==='Enter') analyzePair()">
        <button class="btn btn-primary" onclick="analyzePair()">Go</button>
      </div>
      <div id="pair-error" style="color:#f87171;font-size:11px;margin-top:8px;display:none"></div>
      <div id="pair-result"></div>
    </div>
  </div>

</div>
<script>
const SUPABASE_URL = 'https://itvyvfmpwtioaiifzazn.supabase.co';
const SUPABASE_KEY = 'sb_publishable_i316mdNdrUZO5guRtcYRBg_Zri6X8qR';

const CURRENCY_META = {
  EUR: { color:'#3b82f6', symbol:'EUR/USD' },
  GBP: { color:'#8b5cf6', symbol:'GBP/USD' },
  AUD: { color:'#10b981', symbol:'AUD/USD' },
  NZD: { color:'#06b6d4', symbol:'NZD/USD' },
  JPY: { color:'#f59e0b', symbol:'USD/JPY' },
  CAD: { color:'#ef4444', symbol:'USD/CAD' },
  CHF: { color:'#a78bfa', symbol:'USD/CHF' },
  USD: { color:'#f97316', symbol:'DXY'     },
  XAU: { color:'#fbbf24', symbol:'XAU/USD' },
  BTC: { color:'#64748b', symbol:'BTC/USD' },
};

const REAL_PAIRS = [
  { base:'EUR', quote:'USD' },
  { base:'GBP', quote:'USD' },
  { base:'USD', quote:'JPY' },
  { base:'USD', quote:'CAD' },
  { base:'USD', quote:'CHF' },
  { base:'AUD', quote:'USD' },
  { base:'NZD', quote:'USD' },
  { base:'EUR', quote:'GBP' },
  { base:'EUR', quote:'CHF' },
  { base:'EUR', quote:'JPY' },
  { base:'EUR', quote:'AUD' },
  { base:'EUR', quote:'NZD' },
  { base:'EUR', quote:'CAD' },
  { base:'GBP', quote:'JPY' },
  { base:'GBP', quote:'CAD' },
  { base:'GBP', quote:'AUD' },
  { base:'GBP', quote:'NZD' },
  { base:'GBP', quote:'CHF' },
  { base:'AUD', quote:'JPY' },
  { base:'AUD', quote:'CAD' },
  { base:'AUD', quote:'NZD' },
  { base:'AUD', quote:'CHF' },
  { base:'NZD', quote:'JPY' },
  { base:'NZD', quote:'CAD' },
  { base:'NZD', quote:'CHF' },
  { base:'CAD', quote:'JPY' },
  { base:'CAD', quote:'CHF' },
  { base:'CHF', quote:'JPY' },
  { base:'XAU', quote:'USD' },
];

let state = { data:[], scores:{}, expanded:{}, tab:'dashboard', lastUpdate:null, loading:false };

function getParisHour() {
  const now = new Date();
  const parisTime = new Date(now.toLocaleString('en-US', { timeZone:'Europe/Paris' }));
  return parisTime.getHours() + parisTime.getMinutes() / 60;
}

function getSessions() {
  const h = getParisHour();
  const sessions = [];
  if (h >= 1  && h < 10) sessions.push('🇯🇵 Tokyo');
  if (h >= 9  && h < 18) sessions.push('🇬🇧 Londres');
  if (h >= 14 && h < 23) sessions.push('🇺🇸 New York');
  return sessions;
}

function updateSessions() {
  const sessions = getSessions();
  const el = document.getElementById('sessions-row');
  if (!sessions.length) {
    el.innerHTML = `<div class="session-pill session-off">○ Hors session</div>`;
  } else {
    el.innerHTML = sessions.map(s => `<div class="session-pill session-on">● ${s}</div>`).join('');
  }
}

async function fetchFromSupabase() {
  const res = await fetch(`${SUPABASE_URL}/rest/v1/bias_data?select=*&order=score.desc`, {
    headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` }
  });
  if (!res.ok) throw new Error(`Supabase ${res.status}`);
  return res.json();
}

async function loadData() {
  state.loading = true; updateRefBtn();
  try {
    const rows = await fetchFromSupabase();
    if (!rows || !rows.length) throw new Error('Pas de données');
    state.data = rows;
    state.scores = {};
    rows.forEach(r => state.scores[r.currency] = r.score);
    const dates = rows.map(r => new Date(r.updated_at)).filter(d => !isNaN(d));
    const latest = new Date(Math.max(...dates));
    state.lastUpdate = latest.toLocaleTimeString('fr-FR', {
      timeZone:'Europe/Paris', hour:'2-digit', minute:'2-digit'
    });
    updateBadge(true);
  } catch(e) {
    console.error(e);
    updateBadge(false);
  }
  state.loading = false; updateRefBtn();
  renderAll();
}

function getBias(score) {
  if (score >= 50)  return { text:'Haussier +++', color:'#10b981', sign:'▲▲▲' };
  if (score >= 20)  return { text:'Haussier ++',  color:'#34d399', sign:'▲▲'  };
  if (score >= 0)   return { text:'Haussier +',   color:'#6ee7b7', sign:'▲'   };
  if (score <= -50) return { text:'Baissier ---',  color:'#ef4444', sign:'▼▼▼' };
  if (score <= -20) return { text:'Baissier --',   color:'#f87171', sign:'▼▼'  };
  return                   { text:'Baissier -',    color:'#fca5a5', sign:'▼'   };
}

function scoreBarHTML(score) {
  const pct = ((score+100)/200)*100;
  const left = score>=0 ? 50 : pct;
  const w = Math.abs(score)/2;
  const color = score>=0 ? '#10b981' : '#ef4444';
  return `<div class="score-bar"><div class="score-bar-mid"></div>
    <div class="score-bar-fill" style="left:${left}%;width:${w}%;background:${color}"></div></div>`;
}

function renderCards() {
  const container = document.getElementById('cards-container');
  if (!state.data.length) {
    container.innerHTML = `<div class="loading-card">Chargement des données…</div>`;
    return;
  }
  container.innerHTML = state.data.map(row => {
    const cur = row.currency;
    const meta = CURRENCY_META[cur];
    if (!meta) return '';
    const score = row.score ?? 0;
    const bias = getBias(score);
    const open = state.expanded[cur];
    const confColor = row.confluence==='Confluent'?'#10b981':row.confluence==='Mixte'?'#f59e0b':'#ef4444';
    const confLabel = row.confluence==='Confluent'?'Confluent ✓':row.confluence==='Mixte'?'Mixte ⚠':'Divisé ✗';
    const isUSD = cur === 'USD';

    // Pour USD : pas de détail TF car calculé via formule DXY
    const tfDetail = open && !isUSD ? `<div class="tf-grid">
      ${['M30','H1','H2'].map(tf => {
        const key = tf==='M30'?'tf_m30':tf==='H1'?'tf_h1':'tf_h2';
        const t = row[key];
        const up = t?.distPct >= 0;
        return `<div class="tf-card">
          <div class="tf-label">${tf}</div>
          <div class="tf-row">Prix <span class="tf-val">${t?.price ?? '—'}</span></div>
          <div class="tf-row">MM50 <span class="tf-val">${t?.mm50 ?? '—'}</span></div>
          <div class="tf-dist" style="color:${up?'#10b981':'#ef4444'}">${up?'+':''}${t?.distPct ?? 0}%</div>
        </div>`;
      }).join('')}
    </div>` : (open && isUSD ? `<div style="padding:10px 0;font-size:10px;color:var(--dim)">Score USD calculé via formule DXY pondérée (EUR 60.9% · JPY 14.4% · GBP 12.6% · CAD 9.6% · CHF 3.6%)</div>` : '');

    return `<div class="card" onclick="toggleCard('${cur}')"
      style="border-color:${open ? meta.color+'55' : '#1e293b'}">
      <div class="card-row">
        <div style="display:flex;align-items:center;gap:10px">
          <div class="cur-icon" style="background:${meta.color}20;color:${meta.color}">${cur}</div>
          <div>
            <div style="font-weight:700;font-size:14px;color:var(--text)">${cur}</div>
            <div style="font-size:10px;color:var(--dim)">${meta.symbol}</div>
          </div>
        </div>
        <div style="text-align:right">
          <div class="bias-text" style="color:${bias.color}">${bias.sign} ${bias.text}</div>
          <div class="conf-row">
            <span style="font-size:10px;color:${confColor}">${confLabel}</span>
            <span style="font-size:10px;color:var(--dim)">Score ${score>0?'+':''}${score}</span>
          </div>
        </div>
      </div>
      ${scoreBarHTML(score)}
      ${tfDetail}
    </div>`;
  }).join('');
}

function renderTop3() {
  const container = document.getElementById('top3-container');
  if (!state.data.length) {
    container.innerHTML = '<div style="color:var(--muted);font-size:12px">Données non disponibles</div>';
    return;
  }

  const scores = state.scores;
  const pairs = [];

  for (const p of REAL_PAIRS) {
    const sBase  = scores[p.base];
    const sQuote = scores[p.quote];
    if (sBase === undefined || sQuote === undefined) continue;
    const diff = parseFloat((sBase - sQuote).toFixed(1));
    const absDiff = Math.abs(diff);
    const haussier = diff > 0;
    pairs.push({
      name: `${p.base}${p.quote}`,
      base: p.base, quote: p.quote,
      diff: absDiff, haussier,
      fort:   haussier ? p.base  : p.quote,
      faible: haussier ? p.quote : p.base,
    });
  }

  pairs.sort((a,b) => b.diff - a.diff);
  const top3 = pairs.slice(0, 3);
  const medals = ['🥇','🥈','🥉'];

  container.innerHTML = top3.map((p, i) => {
    let dir, color, arrow;
    if (p.haussier) {
      if (p.diff > 30)      { dir='HAUSSIER +++'; color='#10b981'; arrow='↑↑↑'; }
      else if (p.diff > 15) { dir='HAUSSIER ++';  color='#34d399'; arrow='↑↑';  }
      else                  { dir='HAUSSIER +';   color='#6ee7b7'; arrow='↑';   }
    } else {
      if (p.diff > 30)      { dir='BAISSIER ---'; color='#ef4444'; arrow='↓↓↓'; }
      else if (p.diff > 15) { dir='BAISSIER --';  color='#f87171'; arrow='↓↓';  }
      else                  { dir='BAISSIER -';   color='#fca5a5'; arrow='↓';   }
    }
    return `<div class="top3-card">
      <div class="top3-rank">${medals[i]}</div>
      <div style="flex:1">
        <div class="top3-pair" style="color:${color}">${arrow} ${p.name}</div>
        <div class="top3-diff">
          <span style="color:${CURRENCY_META[p.fort]?.color}">${p.fort}</span> fort vs
          <span style="color:${CURRENCY_META[p.faible]?.color}">${p.faible}</span> faible · Écart ${p.diff} pts
        </div>
      </div>
      <div style="font-size:12px;font-weight:700;color:${color};text-align:right">${dir}</div>
    </div>`;
  }).join('');
}

function analyzePair() {
  const pair = document.getElementById('pair-input').value.toUpperCase().trim();
  const errEl = document.getElementById('pair-error');
  const resEl = document.getElementById('pair-result');
  errEl.style.display='none'; resEl.innerHTML='';
  if (pair.length !== 6) { errEl.textContent='Paire invalide · ex : EURJPY'; errEl.style.display='block'; return; }
  const base = pair.slice(0,3), quote = pair.slice(3,6);
  if (!CURRENCY_META[base])  { errEl.textContent=`Non supporté : ${base}`;  errEl.style.display='block'; return; }
  if (!CURRENCY_META[quote]) { errEl.textContent=`Non supporté : ${quote}`; errEl.style.display='block'; return; }
  const sB = state.scores[base]  ?? 0;
  const sQ = state.scores[quote] ?? 0;
  const diff = parseFloat((sB - sQ).toFixed(1));
  let dir, str, color, arrow;
  if (diff > 30)       { dir='HAUSSIER'; str='+++'; color='#10b981'; arrow='↑↑↑'; }
  else if (diff > 15)  { dir='HAUSSIER'; str='++';  color='#34d399'; arrow='↑↑';  }
  else if (diff >= 0)  { dir='HAUSSIER'; str='+';   color='#6ee7b7'; arrow='↑';   }
  else if (diff < -30) { dir='BAISSIER'; str='---'; color='#ef4444'; arrow='↓↓↓'; }
  else if (diff < -15) { dir='BAISSIER'; str='--';  color='#f87171'; arrow='↓↓';  }
  else                 { dir='BAISSIER'; str='-';   color='#fca5a5'; arrow='↓';   }
  const bB = getBias(sB), bQ = getBias(sQ);
  const mB = CURRENCY_META[base], mQ = CURRENCY_META[quote];
  resEl.innerHTML = `
    <div class="pair-result" style="background:${color}11;border:1px solid ${color}44">
      <div style="font-size:26px;font-weight:800;color:${color};font-family:monospace;letter-spacing:3px">${arrow} ${pair}</div>
      <div style="font-size:16px;font-weight:700;color:${color};margin-top:4px">${dir} ${str}</div>
      <div style="font-size:11px;color:var(--dim);margin-top:6px">Écart : ${diff>0?'+':''}${diff} pts</div>
    </div>
    <div class="cur-compare">
      <div class="cur-box">
        <div style="font-size:10px;color:var(--muted)">${mB.symbol}</div>
        <div style="font-size:20px;font-weight:800;color:${mB.color}">${base}</div>
        <div style="font-size:12px;color:${bB.color};margin-top:4px">${bB.sign} ${sB>0?'+':''}${sB}</div>
        ${scoreBarHTML(sB)}
      </div>
      <div class="cur-box">
        <div style="font-size:10px;color:var(--muted)">${mQ.symbol}</div>
        <div style="font-size:20px;font-weight:800;color:${mQ.color}">${quote}</div>
        <div style="font-size:12px;color:${bQ.color};margin-top:4px">${bQ.sign} ${sQ>0?'+':''}${sQ}</div>
        ${scoreBarHTML(sQ)}
      </div>
    </div>`;
}

function renderAll() { renderCards(); renderTop3(); }
function toggleCard(cur) { state.expanded[cur]=!state.expanded[cur]; renderCards(); }

function switchTab(t) {
  state.tab = t;
  ['dashboard','top3','pair'].forEach(id => {
    document.getElementById(`view-${id}`).style.display = t===id?'block':'none';
    document.getElementById(`tab-${id}`).className = 'tab'+(t===id?' active':'');
  });
}

function updateBadge(isLive) {
  const badge = document.getElementById('badge');
  const text  = document.getElementById('badge-text');
  const maj   = document.getElementById('maj-info');
  if (isLive) {
    badge.classList.add('live');
    text.textContent = `● LIVE`;
    maj.textContent  = `Dernière MAJ : ${state.lastUpdate} (heure Paris)`;
    maj.style.color  = 'var(--muted)';
  } else {
    badge.classList.remove('live');
    text.textContent = `○ Erreur de chargement`;
    maj.textContent  = '';
  }
}

function updateRefBtn() {
  const btn = document.getElementById('btn-refresh');
  btn.disabled = state.loading;
  btn.textContent = state.loading ? '↺ …' : '↺ Refresh';
}

async function handleRefresh() {
  if (state.loading) return;
  await loadData();
}

setInterval(() => loadData(), 30 * 60 * 1000);
updateSessions();
setInterval(updateSessions, 60000);
loadData();
</script>
</body>
</html>
